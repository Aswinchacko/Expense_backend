<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="screenshot.css" />
</head>
<body>
  <div class="canvas">
    <div class="copy">
      <div class="logo-row">
        <svg class="logo-mark" viewBox="0 0 32 32" fill="none"><circle cx="16" cy="16" r="13" stroke="#000" stroke-width="2"/><line x1="10" y1="22" x2="22" y2="10" stroke="#000" stroke-width="2" stroke-linecap="round"/></svg>
        <span class="logo-text">folio</span>
      </div>
      <h1 class="headline">Know where your<br/>money goes.</h1>
      <p class="sub">Category breakdown, cash flow trends, and budget progress — all in one screen.</p>
    </div>
    <div class="phone-wrap">
      <div class="phone">
        <div class="phone-notch"></div>
        <div class="screen">
          <div class="status"><span>9:41</span><span>●●●</span></div>
          <div class="content">
            <p class="page-title">Insights</p>
            <p class="page-sub">Spending breakdown & guidance</p>
            <div class="month-bar"><span class="month-pill">Jun</span><span class="month-pill on">Jul</span><span class="month-pill">Aug</span></div>
            <div class="card" style="padding:16px">
              <div style="display:flex;justify-content:space-between;margin-bottom:12px;font-size:13px;font-weight:600"><span>Cash flow</span><span>+₹2,400</span></div>
              <div class="chart" style="height:64px"><span style="height:24px"></span><span style="height:32px"></span><span class="hi" style="height:48px"></span><span style="height:36px"></span><span class="max" style="height:60px"></span><span style="height:40px"></span><span class="hi" style="height:52px"></span><span style="height:44px"></span></div>
            </div>
            <p class="section-title">By category</p>
            <div class="bar-row"><div class="bar-head"><span>🍔 Food</span><span>34%</span></div><div class="bar-track"><div class="bar-fill" style="width:34%"></div></div></div>
            <div class="bar-row"><div class="bar-head"><span>🚗 Transport</span><span>22%</span></div><div class="bar-track"><div class="bar-fill" style="width:22%"></div></div></div>
            <div class="bar-row"><div class="bar-head"><span>🛍 Shopping</span><span>18%</span></div><div class="bar-track"><div class="bar-fill" style="width:18%"></div></div></div>
            <p class="section-title" style="margin-top:14px">Budgets</p>
            <div class="bar-row"><div class="bar-head"><span>Monthly</span><span>₹5,750 / ₹8,000</span></div><div class="bar-track"><div class="bar-fill" style="width:72%"></div></div></div>
          </div>
          <div class="bottom-bar">
            <span class="nav-dot">☰</span><span class="nav-dot">▦</span><div class="fab">+</div><span class="nav-dot on">↗</span><span class="nav-dot">⚙</span>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
