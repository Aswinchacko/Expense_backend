<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="screenshot.css" />
</head>
<body>
  <div class="canvas">
    <div class="copy">
      <div class="logo-row">
        <svg class="logo-mark" viewBox="0 0 32 32" fill="none"><circle cx="16" cy="16" r="13" stroke="#000" stroke-width="2"/><line x1="10" y1="22" x2="22" y2="10" stroke="#000" stroke-width="2" stroke-linecap="round"/></svg>
        <span class="logo-text">folio</span>
      </div>
      <h1 class="headline">Log spending<br/>in seconds.</h1>
      <p class="sub">Amount, category, save. Faster than finding the receipt in your pocket.</p>
    </div>
    <div class="phone-wrap">
      <div class="phone">
        <div class="phone-notch"></div>
        <div class="screen">
          <div class="status"><span>9:41</span><span>●●●</span></div>
          <div class="content">
            <p class="page-title" style="font-size:22px;margin-bottom:16px">Add expense</p>
            <div class="toggle-row">
              <span class="toggle on">Expense</span>
              <span class="toggle off">Income</span>
            </div>
            <p class="amount-display">₹420</p>
            <div style="text-align:center;margin-bottom:20px">
              <span class="pill" style="font-size:12px;padding:8px 16px">🍔 Food · Today</span>
            </div>
            <div class="keypad">
              <div class="key">1</div><div class="key">2</div><div class="key">3</div>
              <div class="key">4</div><div class="key">5</div><div class="key">6</div>
              <div class="key">7</div><div class="key">8</div><div class="key">9</div>
              <div class="key">.</div><div class="key">0</div><div class="key">⌫</div>
            </div>
            <div style="margin-top:16px"><div class="key dark" style="height:52px;border-radius:999px;font-size:15px">Save expense</div></div>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
