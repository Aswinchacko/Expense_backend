<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="screenshot.css" />
</head>
<body>
  <div class="canvas">
    <div class="copy">
      <div class="logo-row">
        <svg class="logo-mark" viewBox="0 0 32 32" fill="none"><circle cx="16" cy="16" r="13" stroke="#000" stroke-width="2"/><line x1="10" y1="22" x2="22" y2="10" stroke="#000" stroke-width="2" stroke-linecap="round"/></svg>
        <span class="logo-text">folio</span>
      </div>
      <h1 class="headline">Organize every<br/>transaction.</h1>
      <p class="sub">Custom categories with icons — tap to edit, create, or delete anytime.</p>
    </div>
    <div class="phone-wrap">
      <div class="phone">
        <div class="phone-notch"></div>
        <div class="screen">
          <div class="status"><span>9:41</span><span>●●●</span></div>
          <div class="content">
            <p class="page-title">Categories</p>
            <p class="page-sub">Tap any category to edit</p>
            <div class="cat-grid">
              <div class="cat-item"><span>🍔</span>Food</div>
              <div class="cat-item"><span>🚗</span>Transport</div>
              <div class="cat-item"><span>🛍</span>Shopping</div>
              <div class="cat-item"><span>📄</span>Bills</div>
              <div class="cat-item"><span>🎬</span>Fun</div>
              <div class="cat-item"><span>💊</span>Health</div>
              <div class="cat-item"><span>✈️</span>Travel</div>
              <div class="cat-item"><span>💰</span>Salary</div>
              <div class="cat-item"><span>📦</span>Other</div>
            </div>
            <div style="margin-top:20px"><div class="key dark" style="height:48px;border-radius:999px;font-size:14px">+ New category</div></div>
          </div>
          <div class="bottom-bar">
            <span class="nav-dot">☰</span><span class="nav-dot on">▦</span><div class="fab">+</div><span class="nav-dot">↗</span><span class="nav-dot">⚙</span>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
