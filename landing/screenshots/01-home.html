<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="screenshot.css" />
</head>
<body>
  <div class="canvas">
    <div class="copy">
      <div class="logo-row">
        <svg class="logo-mark" viewBox="0 0 32 32" fill="none"><circle cx="16" cy="16" r="13" stroke="#000" stroke-width="2"/><line x1="10" y1="22" x2="22" y2="10" stroke="#000" stroke-width="2" stroke-linecap="round"/></svg>
        <span class="logo-text">folio</span>
      </div>
      <h1 class="headline">Your balance.<br/>Always clear.</h1>
      <p class="sub">See income, expenses, and trends at a glance — every month, one calm view.</p>
    </div>
    <div class="phone-wrap">
      <div class="phone">
        <div class="phone-notch"></div>
        <div class="screen">
          <div class="status"><span>9:41</span><span>●●●</span></div>
          <div class="content">
            <p class="greeting">Good morning</p>
            <p class="greeting-name">Aswin</p>
            <div class="card">
              <p class="balance-label">Balance</p>
              <p class="balance">₹12,450</p>
              <div class="pills"><span class="pill">In ₹18,200</span><span class="pill">Out ₹5,750</span></div>
              <p class="chart-label">Daily spending</p>
              <div class="chart">
                <span style="height:28px"></span><span style="height:36px"></span><span style="height:22px"></span>
                <span style="height:44px"></span><span class="hi" style="height:52px"></span><span style="height:32px"></span>
                <span style="height:40px"></span><span class="hi" style="height:56px"></span><span style="height:38px"></span>
                <span style="height:48px"></span><span class="hi" style="height:60px"></span><span class="max" style="height:72px"></span>
              </div>
            </div>
            <p class="section-title">Transactions</p>
            <div class="tx"><div class="tx-left"><div class="tx-icon">🍔</div><div><div class="tx-name">Swiggy</div><div class="tx-cat">Food</div></div></div><span class="tx-amt">−₹420</span></div>
            <div class="tx"><div class="tx-left"><div class="tx-icon">💼</div><div><div class="tx-name">Salary</div><div class="tx-cat">Income</div></div></div><span class="tx-amt">+₹45,000</span></div>
            <div class="tx"><div class="tx-left"><div class="tx-icon">🚗</div><div><div class="tx-name">Uber</div><div class="tx-cat">Transport</div></div></div><span class="tx-amt">−₹280</span></div>
          </div>
          <div class="bottom-bar">
            <span class="nav-dot on">☰</span><span class="nav-dot">▦</span><div class="fab">+</div><span class="nav-dot">↗</span><span class="nav-dot">⚙</span>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
